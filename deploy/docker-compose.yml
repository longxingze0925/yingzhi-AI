services:
  backend:
    image: ${SHADOWWEAVE_BACKEND_IMAGE}
    restart: unless-stopped
    environment:
      HOST: 0.0.0.0
      PORT: 18777
      ENTITLEHUB_BASE_URL: ${ENTITLEHUB_BASE_URL:-https://ht.0000.icu}
      ENTITLEHUB_SERVER_KEY: ${ENTITLEHUB_SERVER_KEY:-}
      ENTITLEHUB_MOCK: ${ENTITLEHUB_MOCK:-false}
      DEMO_ENTITLEHUB_CUSTOMER_ID: ${DEMO_ENTITLEHUB_CUSTOMER_ID:-00000000-0000-0000-0000-000000000001}
      SHADOWWEAVE_SESSION_COOKIE: ${SHADOWWEAVE_SESSION_COOKIE:-shadowweave_session}
      SHADOWWEAVE_SESSION_TTL_SECONDS: ${SHADOWWEAVE_SESSION_TTL_SECONDS:-604800}
      RUST_LOG: ${RUST_LOG:-shadowweave_backend=info,backend=info,tower_http=info}
    expose:
      - "18777"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:18777/healthz"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s

  web:
    image: ${SHADOWWEAVE_WEB_IMAGE}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
    expose:
      - "3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s
